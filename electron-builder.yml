appId: net.abyss.launcher
productName: Abyss
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
mac:
  target:
    - dmg
  category: public.app-category.games
linux:
  target:
    - AppImage
  category: Game
publish:
  provider: github
  owner: ClemFandango016outlookcom
  repo: Abyss
